<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejercicio4</title>
        <link rel="stylesheet" href="stylesE4.css">
    </head>
    <body>
        <main class="contenedorPrincipal"> <!--Abrir la caja mas grande, todo lo que pongamos a partir de aqui estara dentro de ella-->
            <section class="ladoIzquierdo"> <!--Abrir caja hija del lado izquierdo-->
                <h1 class="logo">facebook</h1>
                <p class="subtitulo">Facebook te ayuda a comunicarte y compartir con las personas que forman parte de tu vida</p>
            </section> <!--Cerra la caja del lado izquierdo-->

            <section class="ladoDerecho"> <!--Abrir otra caja hija del lado derecho-->
                <div class="tarjetaBlanca"> <!--Aqui es donde se envuelven los inputs del lado derecho-->
                    <form class="formularioLogin">
                        <input type="text" placeholder="Correo electrónico o número de telefono">
                        <input type="password" placeholder="Contraseña">
                        <button type="submit" class="botonIniciar">Inciar sesión</button>
                        
                        <button type="submit" class="botonCrear">Crear cuenta nueva</button>
                    </form>
                    <a href="#" class="enlaceContraseña">¿Olvidaste tu contraseña?</a>
                </div> <!--Cerrar donde se envuelven los inputs-->
            </section>

        </main>
    </body>

</html>
